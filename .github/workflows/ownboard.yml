name: OwnBoard sync
on:
  workflow_dispatch: {}
  schedule:
    - cron: "0 3 * * *"
jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: md-hussain28/OwnBoard/.github/actions/ownboard-extract@main
        with:
          api_key: ${{ secrets.OWNBOARD_KEY }}
          endpoint: http://localhost:8000/api/v1/ingest
