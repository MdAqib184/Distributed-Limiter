# PROMETHEUS CONFIGURATION
# Tells Prometheus which endpoints to scrape for metrics
# and how often to scrape them.

global:
  scrape_interval: 15s      # Scrape every 15 seconds
  evaluation_interval: 15s  # Evaluate alerting rules every 15s

scrape_configs:
  # Scrape Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # Scrape all 3 API instances
  # In a real k8s deployment, this would use service discovery
  # (automatically finding new instances as they scale up/down)
  - job_name: 'rate-limiter-api'
    static_configs:
      - targets:
          - 'api-1:3000'
          - 'api-2:3000'
          - 'api-3:3000'
    metrics_path: '/metrics'
    scrape_interval: 10s
