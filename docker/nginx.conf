# NGINX Load Balancer Configuration
#
# This is how "stateless API services behind load balancers" works:
# - nginx receives ALL incoming requests on port 80
# - Round-robin distributes each request to the next available API instance
# - If one instance dies, nginx automatically stops routing to it
# - All 3 instances share Redis, so rate limit state is consistent
#   regardless of which instance handles a given request

events {
    worker_connections 1024;
}

http {
    # Define the "upstream" pool of API instances
    # nginx round-robins requests: api-1, api-2, api-3, api-1, api-2...
    upstream api_servers {
        server api-1:3000;
        server api-2:3000;
        server api-3:3000;
        
        # keepalive: reuse connections (avoids TCP handshake overhead)
        keepalive 32;
    }

    server {
        listen 80;
        server_name _;

        # Pass all requests to the upstream pool
        location / {
            proxy_pass http://api_servers;
            
            # Forward original client IP to API instances
            # Without this, all requests appear to come from nginx's IP
            proxy_set_header X-Forwarded-For $remote_addr;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header Host $host;
            
            # Which API instance handled this request (for debugging)
            add_header X-Upstream-Addr $upstream_addr always;
        }

        # Health check endpoint for the load balancer itself
        location /nginx-health {
            return 200 "OK\n";
            add_header Content-Type text/plain;
        }
    }
}
